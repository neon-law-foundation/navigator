queue_rules:
  - name: default
    queue_conditions:
      - base = main
    merge_method: squash

merge_protections_settings:
  auto_merge_conditions: true

merge_protections:
  - name: main-required-gates
    if:
      - base = main
    success_conditions:
      - "#review-threads-unresolved = 0"
      - "check-success = @github-actions/cargo test (workspace)"
