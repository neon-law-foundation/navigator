queue_rules:
  - name: default
    queue_conditions:
      - base = main
      - -draft
    merge_method: squash

pull_request_rules:
  - name: rebase main PRs when the base branch moves
    conditions:
      - base = main
      - -draft
      - "#commits-behind > 0"
    actions:
      rebase:

  - name: queue ready main PRs
    conditions:
      - base = main
      - -draft
      - "#review-threads-unresolved = 0"
      - "check-success = @github-actions/cargo test (workspace)"
    actions:
      queue:
        name: default

merge_protections:
  - name: main-required-gates
    if:
      - base = main
    success_conditions:
      - "#review-threads-unresolved = 0"
      - "check-success = @github-actions/cargo test (workspace)"
