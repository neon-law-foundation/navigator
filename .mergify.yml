queue_rules:
  - name: default
    queue_conditions:
      - base = main
      - -draft
    merge_method: squash
    # main enforces required_linear_history, so the queue must rebase a stale PR
    # onto main (a merge-commit update would be rejected) to clear the strict
    # "branches up to date" check before the squash merge.
    update_method: rebase

pull_request_rules:
  - name: rebase main PRs when the base branch moves
    conditions:
      - base = main
      - -draft
      - "#commits-behind > 0"
    actions:
      rebase:

  # CI adds the `automerge` label as its final step once the whole gate is green
  # (see .github/workflows/ci.yml). That label is the queue trigger, so a PR
  # enters the queue automatically the moment CI passes — no manual
  # `@Mergifyio queue`. `check-success` is kept as a belt-and-suspenders guard:
  # even if the label is applied by hand before CI is green, Mergify still holds
  # the PR out of the queue until the test job succeeds, and drops it back out
  # the instant a new push turns that check non-green.
  - name: queue main PRs once CI labels them ready
    conditions:
      - base = main
      - -draft
      - "label = automerge"
      - "#review-threads-unresolved = 0"
      - "check-success = @github-actions/cargo test (workspace)"
    actions:
      queue:
        name: default

merge_protections:
  - name: main-required-gates
    if:
      - base = main
    success_conditions:
      - "#review-threads-unresolved = 0"
      - "check-success = @github-actions/cargo test (workspace)"
