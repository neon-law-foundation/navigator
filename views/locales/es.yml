# Español — Spanish chrome catalog.
#
# Mirrors the key tree of en.yml. Any key omitted here falls back to the
# English value, so a partial translation degrades gracefully rather
# than showing a raw key. Product proper nouns (Nexus, Nest, Northstar,
# Nautilus, 1337 Lawyers, Navigator) are NOT translated — they are
# carried through verbatim by `nav_label`.
#
# These are chrome strings (Tier A in docs/i18n.md). The footer legal
# strip — disclaimer, bar-admission prose — is NOT translated here: it
# stays English-source until an attorney reviews the Spanish (Tier B).
nav:
  home: Inicio
  services: Servicios
  mission: Misión
  learn: Aprender
  workshops: Talleres
  presentations: Presentaciones
auth:
  portal: Portal
  sign_in: Iniciar sesión
  sign_out: Cerrar sesión
banner:
  not_accepting: "%{firm} no está aceptando clientes en este momento."
switcher:
  aria: Ver esta página en inglés
footer:
  legal_in_english: "El texto legal vinculante de este sitio se proporciona en inglés."
cta:
  email: "Escríbenos a %{email}"
  consultation: "Reserve una consulta"
products:
  heading: Servicios
  lead: Nuestros servicios legales
  learn_more: Más información
  contact: Inicie un asunto
  cta_blurb: "¿Listo para empezar? Cuéntenos qué necesita y un abogado con licencia se comunicará con usted."
  billed_monthly: Facturación mensual
  billed_yearly: Facturación anual
  billed_hourly: Facturación por hora
  billed_once: Pago único
  free: Gratis
  probono_name: Pro Bono
  # Descripciones de una frase que aparecen bajo el precio de cada producto.
  desc_nest: Constituya su empresa de Nevada y manténgala al día, con un abogado disponible para el trabajo de rutina.
  desc_nexus: Un servicio legal y operativo integral para una empresa en crecimiento, sin facturación por asunto.
  desc_northstar: Su testamento, fideicomiso y directivas de salud y finanzas, preparados y firmados en una conversación grabada.
  desc_nautilus: Un abogado con licencia como su representante para el correo y las llamadas de cobranza, conforme a sus derechos.
  desc_nook: Un cierre inmobiliario de tarifa fija para una venta que ya acordaron, sin corredor de ninguna de las partes.
  desc_litigation: Litigio tecnológico de alto riesgo, facturado por hora y con casos selectos tomados por contingencia.
  desc_nerd: Un perito independiente en disputas de software y acceso a datos, facturado por hora, nunca por contingencia.
  desc_node: La certificación de un hecho por un abogado, como la condición de inversionista acreditado, registrada en cadena en Solana.
  desc_newleaf: Un divorcio de mutuo acuerdo de tarifa fija para una pareja que ya acordó separarse.
  desc_namesake: Una solicitud de marca registrada en EE. UU. de tarifa fija para una clase, preparada y presentada por un abogado con licencia.
  desc_nucleus: Constitución de tarifa fija de un fondo de inversión de Nevada, preparada y presentada por un abogado con licencia.
  desc_probono: Ayuda legal gratuita para personas que no pueden pagar un abogado, con la Neon Law Foundation y socios de asistencia legal.
  desc_default: Servicios legales de tarifa fija con un abogado con licencia.
home:
  theme_strip: Con raíces en Nevada, con alcance en todo el mundo
