# Español — Spanish chrome (the twin of en/chrome.yml).
#
# Mirrors the key tree of en/chrome.yml. Any key omitted here falls back
# to the English value, so a partial translation degrades gracefully
# rather than showing a raw key. Product proper nouns (Nexus, Nest,
# Northstar, Nautilus, 1337 Lawyers, Neon Law Navigator) are NOT
# translated — they are carried through verbatim by `nav_label`.
#
# The footer legal strip — disclaimer, bar-admission prose — is NOT
# translated: it stays English-source until an attorney reviews the
# Spanish (Tier B).
nav:
  home: Inicio
  foundation: Fundación
  firm: Firma
  services: Servicios
  mission: Misión
  notations: Notaciones
  workshops: Talleres
auth:
  portal: Portal
  sign_in: Iniciar sesión
  sign_out: Cerrar sesión
switcher:
  aria: Ver esta página en inglés
footer:
  github_star: Destacar Neon Law Navigator
  legal_in_english: "El texto legal vinculante de este sitio se proporciona en inglés."
