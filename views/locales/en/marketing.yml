# English marketing — the public firm pages (home, /services catalog,
# CTAs, testimonial section headings).
#
# LOCALIZED (Tier A): es/marketing.yml is its Spanish twin, attorney-
# reviewed. A key with no Spanish yet must be named in the es-parity
# waiver in i18n.rs (English fallback until reviewed) — never machine-
# translated marketing copy (CLAUDE.md).
cta:
  # %{email} is the contact address; the button text on marketing pages.
  email: "Email %{email}"
  # Primary firm CTA: books a flat-fee consultation on the firm calendar.
  consultation: "Book a Consultation"
products:
  # The DB-backed `/services` catalog page: every product and its price.
  heading: Services
  lead: Our legal services
  learn_more: Learn more
  contact: Start a matter
  cta_blurb: "Ready to begin? Tell us what you need and a licensed attorney will be in touch."
  billed_monthly: Billed monthly
  billed_yearly: Billed yearly
  billed_hourly: Billed hourly
  billed_once: One-time fee
  # The price label for the free pro bono card.
  free: Free
  probono_name: Pro Bono
  # One-sentence service descriptions shown under each catalog card price.
  desc_nest: Form your Nevada company and keep it in good standing, with an attorney on call for routine legal work.
  desc_nexus: A full legal and operations retainer for a scaling company, with no per-matter billing.
  desc_northstar: Your will, trust, and health and financial directives, prepared and signed in one recorded conversation.
  desc_nautilus: A licensed attorney as your representative for debt-collection mail and calls, answered under your rights.
  desc_nook: A flat-fee real-estate closing for a sale you have already agreed on, with no broker on either side.
  litigation_phase_price: Flat fee
  litigation_phase_suffix: " quoted per phase"
  desc_litigation: High-stakes technology litigation, quoted as a flat fee per phase after case assessment.
  desc_nerd: An independent expert witness on software and data-access disputes, billed hourly.
  desc_node: An attorney attestation of a fact — accredited-investor status, a satisfied closing condition, an entity in good standing — recorded on-chain on Solana.
  desc_newleaf: A flat-fee prenup or uncontested divorce for partners who have already agreed on every term.
  desc_namesake: A flat-fee U.S. trademark filing for one class, prepared and filed by a licensed attorney.
  desc_nucleus: Flat-fee Nevada investment-fund formation, prepared and filed by a licensed attorney.
  desc_probono: Free legal help for people who cannot afford a lawyer, with the Neon Law Foundation and legal-aid partners.
  desc_default: Flat-fee legal services with a licensed attorney in the loop.
home:
  theme_strip: Rooted in Nevada, reaching the world
testimonials:
  # Section headings for the matter-linked testimonial blocks. The copy
  # lives here so it can change in one place — every render site and every
  # test resolves the key, not the literal. (Spanish pending attorney
  # review; see the waiver in i18n.rs.)
  home_heading: What clients say
  home_lead: Published only after client consent and staff review.
  service_heading: Client proof
  service_lead: Matter-linked testimonials approved for this service.
