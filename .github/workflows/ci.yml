name: ci

# The PR flow — one of exactly three workflows in this repo (see CLAUDE.md
# "CI/CD — three workflows, no more"). Lean on purpose: fmt + clippy +
# `cargo test --workspace`, plus repository-wide YAML and Markdown validation
# passes through the Neon Law Navigator CLI. The test pass runs under `cargo llvm-cov` so the
# SAME test pass also emits the lcov uploaded to Codecov for per-PR diff
# coverage (no second test run). Integration (KIND), docker image builds,
# browser tests, and the deploy email all live in the tag flow (`deploy.yml`),
# cut nightly by the cron flow (`release-tag.yml`).
#
# Do NOT add audit/deny/cucumber/docker/e2e jobs back here — the Cucumber BDD
# suite already runs inside `cargo test --workspace`, and the heavy paths
# belong in the nightly tag flow so PR latency stays low. Coverage is the one
# deliberate exception: it piggybacks on the existing test pass so reviewers
# see diff coverage on the PR. Codecov is a hard merge gate: the repository
# `codecov.yml` requires project coverage to never decrease and patch coverage
# to stay complete, so upload failures must block the PR too.

on:
  # Pull requests targeting `main` only. `main` itself never runs CI on push:
  # it advances solely through PRs (merge-only), the nightly cron flow
  # (`release-tag.yml`) is the only thing scheduled against it, and every
  # heavy/deploy path rides the release tag (`deploy.yml`). So the PR run is
  # the single gate before merge — no redundant post-merge push build.
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  # GitHub's native merge queue. When a PR is queued, GitHub builds a temporary
  # `gh-readonly-queue/main/...` ref = latest `main` rebased + this PR (batch
  # size 1, so exactly one PR per group) and fires `merge_group`. The same
  # `cargo test (workspace)` job below then runs against that REBASED commit —
  # the exact tree that will land on `main` — so the full suite re-runs on every
  # rebase, not only on the PR branch. Without this trigger the queue's required
  # check never reports and merges hang. See docs/gitops.md.
  merge_group:

# Default every job to read-only; the one job that needs more (enable-automerge)
# requests pull-requests:write at the job level, so the test job never runs with
# write access — including on merge_group events.
permissions:
  contents: read

jobs:
  rust:
    name: cargo test (workspace)
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      # Treat the cache as an accelerator, never as part of correctness. If the
      # GitHub cache service hiccups, rustc runs locally and the gate still
      # proves the code path.
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
    steps:
      # The standard ubuntu-latest runner ships ~21-28 GB free on `/` — not
      # enough for this workspace's test artifacts (arrow/parquet/iceberg/
      # image-codec/typst deps across many test binaries), so `cargo test`
      # dies with "No space left on device" mid-compile. Reclaim the ~30 GB of
      # pre-installed tooling we never use (Android SDK, .NET, Haskell, the
      # tool cache) instead of paying the slower spin-up of a larger runner.
      # `large-packages: false` skips the slow apt purge — the quick removals
      # already free enough headroom.
      - name: free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          # llvm-tools-preview supplies the instrumentation `cargo llvm-cov`
          # needs to produce the lcov uploaded to Codecov.
          components: rustfmt, clippy, llvm-tools-preview
      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      # OPA backs the authorization policy gate. `cli/tests/opa_policy.rs`
      # extracts the real Rego from `k8s/base/opa/opa.yaml` and runs
      # `opa test` over it; with `CI` set, a missing `opa` binary is a hard
      # failure (the test refuses to silently skip the policy gate).
      - name: install OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest
      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Restoring target/ makes the standard hosted runner run out of
          # disk once clippy and test artifacts accumulate.
          cache-targets: false
      - name: cache rustc outputs with sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      # One Postgres for the whole job — "the same postgres container."
      # With `TEST_DATABASE_URL` set, `store::test_support` connects here
      # and creates a per-test schema instead of spawning a testcontainer
      # per test binary, so the whole workspace shares this single server.
      # `max_connections` is raised because every test binary shares it.
      # The `tag@sha256:…` MUST match `store::test_support::POSTGRES_TAG`;
      # refresh both in the same PR (`docker buildx imagetools inspect
      # postgres:17-alpine` fetches the live index digest).
      - name: start shared test Postgres
        run: |
          docker run -d --shm-size=1g --name test-pg \
            -e POSTGRES_USER=navigator \
            -e POSTGRES_PASSWORD=navigator \
            -e POSTGRES_DB=navigator \
            -p 5432:5432 \
            postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca \
            -c max_connections=300
          for i in $(seq 1 30); do
              if docker exec test-pg pg_isready -U navigator >/dev/null 2>&1; then
                  echo "test-pg ready after $i attempt(s)"; exit 0
              fi
              sleep 1
          done
          echo "test-pg never came up" >&2; exit 1
      - name: cargo fmt
        run: cargo fmt --all -- --check
      # Dogfood the CLI as the Markdown gate: build `navigator` once, then run
      # that binary over the full visible repository tree (including
      # README/CLAUDE-style files). Ordinary docs get prose Markdown rules, and
      # templates get the notation-template superset
      # (questionnaire/workflow/template rules).
      - name: build navigator CLI
        run: cargo build -p cli --quiet
      - name: validate YAML with navigator
        run: ./target/debug/navigator validate-yaml .
      # Reconcile the i18n catalog against the Rust call sites (the
      # i18n-tasks analog): fail on a key named with no catalog entry, or a
      # catalog key referenced nowhere.
      - name: validate i18n catalog with navigator
        run: ./target/debug/navigator validate-i18n .
      - name: validate markdown with navigator
        run: ./target/debug/navigator validate --no-default-excludes .
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: clear clippy artifacts
        run: cargo clean
      # `cargo llvm-cov` runs the identical `cargo test --workspace` pass (incl.
      # the Cucumber BDD suite) under instrumentation, so coverage is a byproduct
      # of the test gate — not a second run — and emits lcov.info for Codecov.
      - name: cargo test (with coverage)
        env:
          TEST_DATABASE_URL: postgres://navigator:navigator@127.0.0.1:5432/navigator
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          # Coverage is a required merge signal; missing uploads must fail CI.
          fail_ci_if_error: true
      - name: show sccache stats
        if: always()
        continue-on-error: true
        run: |
          "${SCCACHE_PATH:-sccache}" --show-stats

  # Compile the bundled Zed extension to wasm. It lives at `lsp/zed-ext/` and is
  # deliberately NOT a workspace member (Zed builds it under its own toolchain to
  # wasm32-wasip2), so `cargo test --workspace` in the `rust` job never touches
  # it. Without this gate a `lib.rs` that doesn't compile would only surface in
  # Zed's registry CI after `deploy.yml` already published it. Small crate, so
  # fmt + clippy + build is fast.
  zed-ext:
    name: build zed extension (wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          targets: wasm32-wasip2
          components: rustfmt, clippy
      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lsp/zed-ext
          key: zed-ext
      - name: cargo fmt --check
        working-directory: lsp/zed-ext
        run: cargo fmt --all -- --check
      - name: cargo clippy (wasm32-wasip2)
        working-directory: lsp/zed-ext
        run: cargo clippy --release --target wasm32-wasip2 --all-targets -- -D warnings
      - name: cargo build (wasm32-wasip2)
        working-directory: lsp/zed-ext
        run: cargo build --release --target wasm32-wasip2

  # Turn on GitHub auto-merge once per PR, on open / ready-for-review only (never
  # on `synchronize`, so a human who deliberately disabled it isn't overridden on
  # the next push, and never on `merge_group`). With the merge queue configured
  # on `main`, enabling auto-merge is what enqueues the PR the moment its gate is
  # green and threads are resolved — no manual "Merge when ready", no babysitting.
  # `gh pr merge --auto` only *requests* it; GitHub still holds the PR out of the
  # queue until the required `cargo test (workspace)` check passes. The fork guard
  # skips PRs from forks, whose GITHUB_TOKEN is read-only.
  enable-automerge:
    name: enable PR auto-merge
    # Only this job needs write; the test job stays contents:read (above).
    # `enablePullRequestAutoMerge` requires contents:write — pull-requests:write
    # alone returns "Resource not accessible by integration".
    permissions:
      contents: write
      pull-requests: write
    if: >
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'ready_for_review') &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # The App ID lives in a secret (not a variable) because the navigator-gitops
    # Doppler config is the single source of truth and auto-syncs to GitHub
    # Actions *secrets* — this repo has no Actions *variables*. Hoisted to
    # job-level env so the step `if` below can gate on its presence: the
    # `secrets` context is unavailable in `if`, but `env` is.
    env:
      AUTOMERGE_APP_ID: ${{ secrets.AUTOMERGE_APP_ID }}
    steps:
      # Enable auto-merge as a GitHub App, NOT the default GITHUB_TOKEN. Auto-merge
      # is what enqueues the PR into the native merge queue on `main`, and the queue
      # builds a `gh-readonly-queue/main/...` ref that must fire `merge_group` so the
      # required `cargo test (workspace)` check reports. But "events triggered by the
      # GITHUB_TOKEN will not create a new workflow run" (GitHub Actions docs), so a
      # PR that GITHUB_TOKEN enqueues never runs `merge_group`, the required check
      # never reports, and the entry times out and is dropped from the queue — the
      # PR sits "auto-merge enabled, CLEAN" forever. A GitHub App installation token
      # (or a PAT) is the documented fix. See docs/gitops.md.
      #
      # Guarded on the App being configured: until `AUTOMERGE_APP_ID` and
      # `AUTOMERGE_APP_PRIVATE_KEY` exist (set in the navigator-gitops Doppler
      # config, which syncs to Actions secrets) this step is skipped and the next
      # step falls back to GITHUB_TOKEN (today's behavior — no worse, and forks
      # without the App still pass).
      #
      # Dependabot caveat: a Dependabot-opened PR runs this job with the separate
      # *Dependabot* secret store, where `AUTOMERGE_APP_ID` is empty unless the App
      # secrets are mirrored there too — so this step is skipped, the GITHUB_TOKEN
      # fallback never enqueues, and the bump PR sits "auto-merge enabled, CLEAN"
      # forever. Mirror both secrets into the Dependabot store. See docs/gitops.md.
      - name: mint app token
        id: app-token
        if: env.AUTOMERGE_APP_ID != ''
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AUTOMERGE_APP_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}
      - name: request auto-merge
        env:
          # App token when configured; otherwise GITHUB_TOKEN (skipped step → empty).
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          auto_merge_enabled="$(
              gh pr view "${PR_URL}" \
                  --json autoMergeRequest \
                  --jq '.autoMergeRequest != null'
          )"
          if [ "${auto_merge_enabled}" = "true" ]; then
              echo "auto-merge already enabled; nothing to do."
              exit 0
          fi
          # No merge strategy flag: the native merge queue on `main` owns the
          # method, and passing --squash errors with "The merge strategy for
          # main is set by the merge queue".
          gh pr merge --auto "${PR_URL}"
