name: ci

# The PR flow — one of exactly three workflows in this repo (see CLAUDE.md
# "CI/CD — three workflows, no more"). Lean on purpose: fmt + clippy +
# `cargo test --workspace`, run under `cargo llvm-cov` so the SAME test pass
# also emits the lcov uploaded to Codecov for per-PR diff coverage (no second
# test run). Integration (KIND), docker image builds, browser tests, and the
# deploy email all live in the tag flow (`deploy.yml`), cut nightly by the
# cron flow (`release-tag.yml`).
#
# Do NOT add audit/deny/cucumber/docker/e2e jobs back here — the Cucumber BDD
# suite already runs inside `cargo test --workspace`, and the heavy paths
# belong in the nightly tag flow so PR latency stays low. Coverage is the one
# deliberate exception: it piggybacks on the existing test pass so reviewers
# see diff coverage on the PR, and a Codecov upload hiccup never blocks the
# merge gate (`fail_ci_if_error: false`).

on:
  # Pull requests targeting `main` only. `main` itself never runs CI on push:
  # it advances solely through PRs (merge-only), the nightly cron flow
  # (`release-tag.yml`) is the only thing scheduled against it, and every
  # heavy/deploy path rides the release tag (`deploy.yml`). So the PR run is
  # the single gate before merge — no redundant post-merge push build.
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  rust:
    name: cargo test (workspace)
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      # The standard ubuntu-latest runner ships ~21-28 GB free on `/` — not
      # enough for this workspace's test artifacts (arrow/parquet/iceberg/
      # image-codec/typst deps across many test binaries), so `cargo test`
      # dies with "No space left on device" mid-compile. Reclaim the ~30 GB of
      # pre-installed tooling we never use (Android SDK, .NET, Haskell, the
      # tool cache) instead of paying the slower spin-up of a larger runner.
      # `large-packages: false` skips the slow apt purge — the quick removals
      # already free enough headroom.
      - name: free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          # llvm-tools-preview supplies the instrumentation `cargo llvm-cov`
          # needs to produce the lcov uploaded to Codecov.
          components: rustfmt, clippy, llvm-tools-preview
      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      # OPA backs the authorization policy gate. `cli/tests/opa_policy.rs`
      # extracts the real Rego from `k8s/base/opa/opa.yaml` and runs
      # `opa test` over it; with `CI` set, a missing `opa` binary is a hard
      # failure (the test refuses to silently skip the policy gate).
      - name: install OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest
      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Restoring target/ makes the standard hosted runner run out of
          # disk once clippy and test artifacts accumulate.
          cache-targets: false
      # One Postgres for the whole job — "the same postgres container."
      # With `TEST_DATABASE_URL` set, `store::test_support` connects here
      # and creates a per-test schema instead of spawning a testcontainer
      # per test binary, so the whole workspace shares this single server.
      # `max_connections` is raised because every test binary shares it.
      # The `tag@sha256:…` MUST match `store::test_support::POSTGRES_TAG`;
      # refresh both in the same PR (`docker buildx imagetools inspect
      # postgres:17-alpine` fetches the live index digest).
      - name: start shared test Postgres
        run: |
          docker run -d --shm-size=1g --name test-pg \
            -e POSTGRES_USER=navigator \
            -e POSTGRES_PASSWORD=navigator \
            -e POSTGRES_DB=navigator \
            -p 5432:5432 \
            postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca \
            -c max_connections=300
          for i in $(seq 1 30); do
              if docker exec test-pg pg_isready -U navigator >/dev/null 2>&1; then
                  echo "test-pg ready after $i attempt(s)"; exit 0
              fi
              sleep 1
          done
          echo "test-pg never came up" >&2; exit 1
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: clear clippy artifacts
        run: cargo clean
      # `cargo llvm-cov` runs the identical `cargo test --workspace` pass (incl.
      # the Cucumber BDD suite) under instrumentation, so coverage is a byproduct
      # of the test gate — not a second run — and emits lcov.info for Codecov.
      - name: cargo test (with coverage)
        env:
          TEST_DATABASE_URL: postgres://navigator:navigator@127.0.0.1:5432/navigator
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          # Never let a Codecov outage block the auto-merge gate.
          fail_ci_if_error: false

  enable-automerge:
    name: enable PR auto-merge
    needs: rust
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: enable auto-merge for current PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          current_head="$(gh pr view "${PR_URL}" --json headRefOid --jq .headRefOid)"
          if [ "${current_head}" != "${PR_HEAD_SHA}" ]; then
              echo "PR head moved from ${PR_HEAD_SHA} to ${current_head}; a newer CI run will handle auto-merge."
              exit 0
          fi

          auto_merge_enabled="$(
              gh pr view "${PR_URL}" \
                  --json autoMergeRequest \
                  --jq '.autoMergeRequest != null'
          )"
          if [ "${auto_merge_enabled}" = "true" ]; then
              echo "Auto-merge is already enabled for ${PR_URL}."
              exit 0
          fi

          gh pr merge --auto --squash \
              --match-head-commit "${PR_HEAD_SHA}" \
              "${PR_URL}"
