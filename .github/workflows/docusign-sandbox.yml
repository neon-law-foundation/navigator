name: docusign sandbox

# Layer 4 of the e-signature validation: the live DocuSign demo smoke
# test (web/tests/docusign_sandbox.rs). It mints a JWT-grant token and
# creates a real envelope in the demo environment — the only test that
# catches a regression in our understanding of DocuSign's API that the
# wiremock-backed `web/src/signature.rs` tests can't. It is gated by
# `NAVIGATOR_RUN_LIVE_SANDBOX` (set below) and self-skips without it +
# the sandbox secrets, so it never fires from per-PR CI.
#
# Cadence: weekly (Monday 07:00 UTC). The per-PR suite already covers
# the DocuSign code paths with zero live calls via wiremock; this live
# canary exists only to catch upstream API drift a mock can't, which
# moves slowly — so it runs rarely rather than nightly.
#
# To trigger manually: `gh workflow run docusign-sandbox.yml` (or click
# "Run workflow" in the Actions tab).

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

concurrency:
  group: docusign-sandbox
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sandbox-smoke:
    name: live DocuSign demo envelope
    # Forks have no secrets — skip rather than fail red there.
    if: github.repository == 'NeonLaw/Navigator'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Opt in to the live external-API test (it self-skips otherwise).
      NAVIGATOR_RUN_LIVE_SANDBOX: "1"
      DOCUSIGN_SANDBOX_INTEGRATION_KEY: ${{ secrets.DOCUSIGN_SANDBOX_INTEGRATION_KEY }}
      DOCUSIGN_SANDBOX_USER_ID: ${{ secrets.DOCUSIGN_SANDBOX_USER_ID }}
      DOCUSIGN_SANDBOX_RSA_KEY: ${{ secrets.DOCUSIGN_SANDBOX_RSA_KEY }}
      DOCUSIGN_SANDBOX_BASE_URL: ${{ secrets.DOCUSIGN_SANDBOX_BASE_URL }}
      DOCUSIGN_SANDBOX_ACCOUNT_ID: ${{ secrets.DOCUSIGN_SANDBOX_ACCOUNT_ID }}
      DOCUSIGN_SANDBOX_SIGNER_EMAIL: ${{ secrets.DOCUSIGN_SANDBOX_SIGNER_EMAIL }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - name: cache cargo
        uses: Swatinem/rust-cache@v2
      - name: live sandbox smoke
        run: cargo test -p web --test docusign_sandbox -- --nocapture
