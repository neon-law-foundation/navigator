name: fresh-clone

# Weekly "from scratch" build: no cache, fresh checkout, full
# pipeline. Catches:
# - transitive breakage from Cloud SQL / Restate Operator / the
#   `google-cloud-*` SDK family between point releases,
# - missing inputs in `images/Dockerfile.web` / `images/Dockerfile.workflows-service`
#   that the cached `ci` job hides,
# - any clippy lint that newly fires on a freshly-resolved tree.
#
# Lives separately from `ci.yml` so it can run on the slow path
# (no rust-cache, no docker GHA cache) without dragging PR latency
# up.

on:
  schedule:
    # Sundays 02:00 UTC. Pick a quiet window so a flake doesn't
    # collide with the Monday auto-deploy cron.
    - cron: "0 2 * * 0"
  workflow_dispatch:

jobs:
  rust:
    name: cargo test (no cache)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - name: prime testcontainers Postgres image
        run: docker pull postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace
      - name: markdown lint
        run: cargo run -p cli --quiet -- validate --markdown-only --no-default-excludes .
      - name: validate templates
        run: cargo run -p cli --quiet -- validate templates

  docker:
    name: docker build (no cache)
    needs: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build navigator-web (no cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: navigator-web:fresh
          no-cache: true
      - name: build navigator-workflows-service (no cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/Dockerfile.workflows-service
          push: false
          load: true
          tags: navigator-workflows-service:fresh
          no-cache: true

  notify-on-failure:
    name: notify on failure
    needs: [rust, docker]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: open an issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `fresh-clone: weekly build broke on ${new Date().toISOString().slice(0,10)}`;
            const body = [
              "The unsupervised Sunday fresh-clone build failed.",
              "",
              `Run: ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
              "",
              "Likely culprits (in rough order):",
              "- a `google-cloud-*` point release shifted an API,",
              "- the Restate Operator helm chart bumped a CRD shape,",
              "- a transitive dep added a clippy lint that newly fires,",
              "- a Dockerfile assumes a cached layer that doesn't exist on a cold build.",
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["ci", "fresh-clone"],
            });
