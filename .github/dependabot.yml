# ⚠️  DO NOT EDIT THIS FILE.  Agents must never modify .github/dependabot.yml —
# no `ignore` rules, no schedule/grouping tweaks, no config change to quiet a
# bump. When a Dependabot PR is unhappy, fix the CODE or the MANIFEST it touches,
# never this file. (The sole carve-out is this banner.)
#
# Why a Dependabot PR sometimes enables auto-merge but never enters the merge
# queue — and how to fix it (mirror the auto-merge App secrets into the separate
# Dependabot secret store) — is documented in docs/gitops.md.
#
# Dependabot version-updates configuration reference:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Rust crates — the whole Cargo workspace (root manifest + members).
  # Minor/patch bumps are grouped into one PR to cut noise; majors come as
  # individual PRs and stay gated behind /council per the workspace rules.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the three CI/deploy workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  # Base images for the container builds under images/.
  - package-ecosystem: "docker"
    directories:
      - "/images"
    schedule:
      interval: "weekly"
    groups:
      docker:
        patterns:
          - "*"
