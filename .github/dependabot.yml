# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Rust crates — the whole Cargo workspace (root manifest + members).
  # Minor/patch bumps are grouped into one PR to cut noise; majors come as
  # individual PRs and stay gated behind /council per the workspace rules.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the three CI/deploy workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  # Base images for the container builds under images/ and tools/dev/.
  - package-ecosystem: "docker"
    directories:
      - "/images"
      - "/tools/dev"
    schedule:
      interval: "weekly"
    groups:
      docker:
        patterns:
          - "*"
