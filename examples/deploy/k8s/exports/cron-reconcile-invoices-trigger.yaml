# reconcile-invoices nightly trigger — starts one `ReconcileInvoices`
# Restate workflow invocation per day. The workflow itself is hosted by the
# `workflows-service` worker (../gke/workflows-service/) — all workflows
# live there, so there is no separate billing worker. This CronJob is a
# thin trigger that POSTs to the Restate ingress and exits in seconds.
# Restate owns the retry schedule from there.
#
# The reconcile reads every `xero_invoices` mirror row not yet in a
# terminal state (PAID / VOIDED) back from Xero and folds the current
# status + amount paid onto the mirror, so the portal's per-project invoice
# list reflects payments without ever calling Xero on a page load. A
# settled invoice is never polled again.
#
# Schedule `0 11 * * *` UTC = daily 03:00 PST (04:00 PDT) — after the
# archives nightly (10:00 UTC) so the two don't contend.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: reconcile-invoices-trigger
  namespace: navigator
  labels:
    app: reconcile-invoices-trigger
spec:
  schedule: "0 11 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 7
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: reconcile-invoices-trigger
        spec:
          restartPolicy: OnFailure
          containers:
            - name: reconcile-invoices-trigger
              image: ghcr.io/neon-law-foundation/navigator-reconcile-invoices-trigger:YY.M.D
              imagePullPolicy: Always
              env:
                # Restate Cloud ingress endpoint for the navigator-prod
                # environment. The trigger POSTs
                # `${RESTATE_INGRESS_URL}/ReconcileInvoices/<run-date>/run`.
                - name: RESTATE_INGRESS_URL
                  value: https://YOUR_RESTATE_CLOUD_INGRESS
                # Restate Cloud authenticates every ingress call with the
                # tenant bearer. Sourced from the same `navigator-web-secrets`
                # Secret the web Deployment mounts. `optional` so KIND — where
                # this manifest isn't applied — never blocks on a missing key.
                - name: RESTATE_AUTH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: navigator-web-secrets
                      key: RESTATE_AUTH_TOKEN
                      optional: true
                - name: RUST_LOG
                  value: info
              envFrom:
                # Collector endpoint (OTEL_EXPORTER_OTLP_ENDPOINT) — the trigger
                # emits the `navigator.workflow.trigger.fired` metric (flushed on
                # exit) through the fail-closed redaction collector. Shared with
                # web + workflows-service via one ConfigMap.
                - configMapRef:
                    name: navigator-otel-env
              resources:
                requests:
                  cpu: 100m
                  memory: 64Mi
                limits:
                  memory: 128Mi
