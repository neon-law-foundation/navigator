apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: navigator

# Scheduled triggers. The `Archives` (nightly) and `Statutes` (weekly)
# workflows are both hosted by the `workflows-service` worker (see
# ../gke/workflows-service/) — these CronJobs are thin triggers that POST
# to the Restate Cloud ingress to start one invocation, then exit. The
# `Statutes` run scrapes the NRS into Postgres for the public /statutes
# reference and emails a Foundation-branded summary.
resources:
  - cron-archives-trigger.yaml
  - cron-statutes-trigger.yaml
  - cron-heartbeat-trigger.yaml
  - cron-billing-digest-trigger.yaml
