# Mount the Secret Manager CSI volume on the `web` container.
#
# This patch is the second half of the CSI secret-sync (the first is
# secret-provider-class.yaml). It is scaffolding for the same reason:
# the `driver:` name is a live-cluster fact. Activate both together.
#
# WHY A MOUNT IS REQUIRED EVEN THOUGH WE WANT envFrom
# ---------------------------------------------------
# The GKE driver only writes the `secretObjects` K8s Secret while at
# least one pod mounts the volume — the sync is volume-lifecycle
# driven, not a standalone controller. So `web` mounts the volume at
# `/var/secrets` (the files are a side effect we don't read) purely so
# the driver keeps `navigator-web-secrets` reconciled; `web` and
# `workflows-service` still consume the values via their existing
# `envFrom: secretRef: navigator-web-secrets`. Pod picks up a rotated
# value on its next restart (add a reloader annotation later for
# restart-free rotation).
#
# If `kubectl get csidrivers` shows a name other than
# `secrets-store-gke.csi.k8s.io`, change the `driver:` field to match.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: navigator-web
  namespace: navigator
spec:
  template:
    spec:
      containers:
        - name: web
          volumeMounts:
            - name: web-secrets-store
              mountPath: /var/secrets
              readOnly: true
      volumes:
        - name: web-secrets-store
          csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: navigator-web
