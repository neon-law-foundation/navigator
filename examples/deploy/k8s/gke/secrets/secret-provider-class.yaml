# SecretProviderClass — sync Secret Manager → the `navigator-web-secrets`
# Kubernetes Secret via the GKE-managed Secret Manager CSI driver.
#
# WHY THIS IS SCAFFOLDING, NOT YET ACTIVE
# ---------------------------------------
# Today `navigator-web-secrets` is a plain Secret maintained
# out-of-band (`kubectl create secret generic … --from-literal=…`).
# Rotating a value means re-running that command; Secret Manager
# versions don't propagate. This manifest is the fix — but it binds
# to a driver whose exact registered name is a live-cluster fact, so
# it ships present-and-documented (like the iap/ BackendConfig) rather
# than wired into the active overlay. Confirm the driver name, then
# activate (see ACTIVATION below).
#
# The GKE add-on (`gcloud container clusters … --enable-secret-manager`)
# registers the CSI driver as `secrets-store-gke.csi.k8s.io` — NOT the
# upstream `secrets-store.csi.k8s.io`. The `provider: gke` field and
# that driver name are the GKE-specific pieces; the `SecretProviderClass`
# CRD itself is the shared `secrets-store.csi.x-k8s.io/v1` kind.
#
# ACTIVATION (run on the live cluster, then flip the kustomization)
# -----------------------------------------------------------------
#   # 1. Confirm the driver name the add-on registered:
#   kubectl get csidrivers
#   #    → expect `secrets-store-gke.csi.k8s.io`; if it differs, update
#   #      the `driver:` field in web-secrets-csi-mount.yaml to match.
#   # 2. Create one Secret Manager secret per key below (if absent):
#   printf %s "$DATABASE_URL" | gcloud secrets create DATABASE_URL \
#       --project=YOUR_PROJECT_ID --data-file=-
#   #    …repeat for each key in `secretObjects.data`.
#   # 3. Uncomment the secrets/ resource + patch lines in
#   #    ../kustomization.yaml and `kubectl apply -k ..`.
#   # 4. Delete the hand-maintained plain Secret; the mounted volume
#   #    recreates `navigator-web-secrets` from Secret Manager, and a
#   #    pod restart re-reads it.
#
# The bound GSA `navigator-web@YOUR_PROJECT_ID.iam.gserviceaccount.com`
# already holds `roles/secretmanager.secretAccessor` (Workload Identity),
# so no new IAM is needed.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: navigator-web
  namespace: navigator
spec:
  provider: gke
  parameters:
    # One entry per Secret Manager secret. `resourceName` pins
    # `versions/latest` so a new version is picked up on the CSI
    # driver's next rotation poll (~minutes); `path` is the in-volume
    # filename that `secretObjects` below maps to a Secret key.
    secrets: |
      - resourceName: "projects/YOUR_PROJECT_ID/secrets/DATABASE_URL/versions/latest"
        path: "DATABASE_URL"
      - resourceName: "projects/YOUR_PROJECT_ID/secrets/SESSION_SECRET/versions/latest"
        path: "SESSION_SECRET"
      - resourceName: "projects/YOUR_PROJECT_ID/secrets/OAUTH_CLIENT_SECRET/versions/latest"
        path: "OAUTH_CLIENT_SECRET"
      - resourceName: "projects/YOUR_PROJECT_ID/secrets/RESTATE_BROKER_URL/versions/latest"
        path: "RESTATE_BROKER_URL"
      - resourceName: "projects/YOUR_PROJECT_ID/secrets/RESTATE_AUTH_TOKEN/versions/latest"
        path: "RESTATE_AUTH_TOKEN"
      - resourceName: "projects/YOUR_PROJECT_ID/secrets/SENDGRID_API_KEY/versions/latest"
        path: "SENDGRID_API_KEY"
      - resourceName: "projects/YOUR_PROJECT_ID/secrets/SENDGRID_INBOUND_SECRET/versions/latest"
        path: "SENDGRID_INBOUND_SECRET"
      - resourceName: "projects/YOUR_PROJECT_ID/secrets/SENDGRID_EVENTS_SECRET/versions/latest"
        path: "SENDGRID_EVENTS_SECRET"
      # Boot invariant (web::config::enforce_prod_invariants): the ECDSA
      # P-256 public key the /api/email-events endpoint verifies SendGrid's
      # event signatures against. Public material, but kept on the Secret
      # rail beside SENDGRID_EVENTS_SECRET so the two events-webhook inputs
      # rotate together. Missing this crash-loops the pod.
      - resourceName: "projects/YOUR_PROJECT_ID/secrets/SENDGRID_EVENTS_PUBLIC_KEY/versions/latest"
        path: "SENDGRID_EVENTS_PUBLIC_KEY"
      # DocuSign auth. The provider (web::signature::from_env, bd9c15e)
      # PREFERS JWT grant — the RSA private key below + the integration
      # key/user id/account id/base url from the web-env ConfigMap — and
      # falls back to the static DOCUSIGN_ACCESS_TOKEN only when the JWT
      # inputs are absent. Keep both so a token-mint outage degrades to
      # the static token rather than the stub.
      - resourceName: "projects/YOUR_PROJECT_ID/secrets/DOCUSIGN_PRIVATE_KEY/versions/latest"
        path: "DOCUSIGN_PRIVATE_KEY"
      - resourceName: "projects/YOUR_PROJECT_ID/secrets/DOCUSIGN_ACCESS_TOKEN/versions/latest"
        path: "DOCUSIGN_ACCESS_TOKEN"
      - resourceName: "projects/YOUR_PROJECT_ID/secrets/DOCUSIGN_HMAC_KEY/versions/latest"
        path: "DOCUSIGN_HMAC_KEY"
      - resourceName: "projects/YOUR_PROJECT_ID/secrets/XERO_TENANT_ID/versions/latest"
        path: "XERO_TENANT_ID"
      - resourceName: "projects/YOUR_PROJECT_ID/secrets/XERO_CLIENT_ID/versions/latest"
        path: "XERO_CLIENT_ID"
      - resourceName: "projects/YOUR_PROJECT_ID/secrets/XERO_CLIENT_SECRET/versions/latest"
        path: "XERO_CLIENT_SECRET"
  # Project each mounted file into the `navigator-web-secrets` Secret
  # under the env-var key `web` (and `workflows-service`) read via
  # `envFrom`. The key set MUST stay in lockstep with the keys the
  # web-env.yaml patch documents; add `SENDGRID_FROM_EMAIL` here only
  # if you also create that optional Secret Manager secret.
  secretObjects:
    - secretName: navigator-web-secrets
      type: Opaque
      data:
        - objectName: "DATABASE_URL"
          key: "DATABASE_URL"
        - objectName: "SESSION_SECRET"
          key: "SESSION_SECRET"
        - objectName: "OAUTH_CLIENT_SECRET"
          key: "OAUTH_CLIENT_SECRET"
        - objectName: "RESTATE_BROKER_URL"
          key: "RESTATE_BROKER_URL"
        - objectName: "RESTATE_AUTH_TOKEN"
          key: "RESTATE_AUTH_TOKEN"
        - objectName: "SENDGRID_API_KEY"
          key: "SENDGRID_API_KEY"
        - objectName: "SENDGRID_INBOUND_SECRET"
          key: "SENDGRID_INBOUND_SECRET"
        - objectName: "SENDGRID_EVENTS_SECRET"
          key: "SENDGRID_EVENTS_SECRET"
        - objectName: "SENDGRID_EVENTS_PUBLIC_KEY"
          key: "SENDGRID_EVENTS_PUBLIC_KEY"
        - objectName: "DOCUSIGN_PRIVATE_KEY"
          key: "DOCUSIGN_PRIVATE_KEY"
        - objectName: "DOCUSIGN_ACCESS_TOKEN"
          key: "DOCUSIGN_ACCESS_TOKEN"
        - objectName: "DOCUSIGN_HMAC_KEY"
          key: "DOCUSIGN_HMAC_KEY"
        - objectName: "XERO_TENANT_ID"
          key: "XERO_TENANT_ID"
        - objectName: "XERO_CLIENT_ID"
          key: "XERO_CLIENT_ID"
        - objectName: "XERO_CLIENT_SECRET"
          key: "XERO_CLIENT_SECRET"
