# Pin the prod web image to a specific published ghcr release. The daily
# tag flow in `.github/workflows/deploy.yml` builds `main` HEAD and
# publishes to `ghcr.io/neon-law-foundation/navigator-web:YY.MM.DD` (the
# release date) + `latest`. Pin the dated `YY.MM.DD` tag here — never
# `:latest` on a workload — and `navigator power-push` (or a hand-bump
# that Config Sync rolls forward on the next 15s tick) moves it. A fork
# swaps `neon-law-foundation` for its own org; the public packages pull
# anonymously, so no imagePullSecret is needed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: navigator-web
  namespace: navigator
spec:
  template:
    spec:
      containers:
        - name: web
          image: ghcr.io/neon-law-foundation/navigator-web:YY.MM.DD
          imagePullPolicy: IfNotPresent
