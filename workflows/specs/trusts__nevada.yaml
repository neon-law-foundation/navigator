questionnaire:
  BEGIN:
    _: person__trustee
  person__trustee:
    _: custom_text__trust_property
  custom_text__trust_property:
    _: END
  END: {}
prompts:
  trustee_name: Who is the trustee of the trust?
  trust_property: What property does the trust hold as its corpus?
workflow:
  BEGIN:
    intake_submitted: intake_persisted__trustee
  intake_persisted__trustee:
    trust_rendered: staff_review
  staff_review:
    approved: document_open__trust_pdf
    rejected: END
  document_open__trust_pdf:
    pdf_persisted: sent_for_signature__pending
  sent_for_signature__pending:
    signature_received: END
    signature_declined: END
  END: {}
