# 8. Authorized shares.

[[field]]
name = "Total authorized shares"
question = "shares_authorized"

[[field]]
name = "Par Value_0"
question = "par_value"

# Name, Address and Signature of the Incorporator. In this flow the
# first listed director acts as the incorporator; the attorney confirms
# at staff review before anything is signed or filed.

[[field]] # OmniForm swallowed the perjury notice into the incorporator name field's /T.
name = "knowingly offer any false or forged instrument for filing in the Office of the Secretary of State"
question = "directors"
row = 0
part = "name"

[[field]]
name = "Addressb"
question = "directors"
row = 0
part = "street"

[[field]]
name = "City_6"
question = "directors"
row = 0
part = "city"

[[field]]
name = "State_4b"
question = "directors"
row = 0
part = "state"

[[field]]
name = "ZipPostal Code_4b"
question = "directors"
row = 0
part = "zip"

[[field]]
name = "Country_4b"
question = "directors"
row = 0
part = "country"

