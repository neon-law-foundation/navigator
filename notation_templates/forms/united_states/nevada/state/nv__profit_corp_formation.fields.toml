# Field map for the NV SoS Profit Corporation Formation Packet
# (NRS 78, rev 2024-05). Field names are the exact AcroForm /T from a
# dump of the vendored bytes — no guessing (vendor-gov-forms skill).
# Payment-card fields and the Registered Agent Acceptance page are
# deliberately unmapped. The shared-widget `City` field (kid pages
# [6, 10] — initial list AND ePayment checklist) is never mapped.

form_code = "nv__profit_corp_formation"

# ---- Articles of Incorporation (packet pages 2-3) ----

[[field]] # Filing under NRS 78: domestic profit corporation.
name = "formation1"
literal = "NRS 78"

[[field]]
name = "1Name of Entity"
question = "entity_name"

[[field]]
name = "2Name_Registered_Agent"
question = "registered_agent"

# 4. Board of Directors / Trustees — three slots.

[[field]]
name = "4Name_1"
question = "directors"
row = 0
part = "name"

[[field]]
name = "4Street Address_2B"
question = "directors"
row = 0
part = "street"

[[field]]
name = "4City_1"
question = "directors"
row = 0
part = "city"

[[field]]
name = "4State"
question = "directors"
row = 0
part = "state"

[[field]]
name = "4ZipPostal Code_1"
question = "directors"
row = 0
part = "zip"

[[field]]
name = "4Countrya"
question = "directors"
row = 0
part = "country"

[[field]]
name = "4Name_2a"
question = "directors"
row = 1
part = "name"

[[field]]
