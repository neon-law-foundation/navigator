# Vendored government forms — single source of truth.
#
# Every official form we fill and file is pinned here by canonical source,
# printed revision, and SHA-256. The bytes on disk (at `notation_templates/` +
# `object_path`) are the canonical example; this file records what they are
# and where they came from. `forms/tests/vendored_forms.rs` recomputes each
# `sha256` from the bundled bytes and fails on drift, so this file cannot lie.
#
# To add or refresh a form, use the `vendor-gov-forms` skill — canonical
# source only (the issuing authority's own domain), never a mirror or the
# Wayback Machine, and the canonical example must be on disk before any
# field map is authored. One commit per acquisition or refresh: the commit
# history is the verifiable timestamp ledger.
#
# Fields:
#   authority    the issuing government office
#   name         human label, as the authority titles the form
#   form_code    stable id; templates and field maps reference this
#   revision     the revision date printed on the form itself (newest page)
#   source_url   the canonical page the bytes were downloaded from
#   retrieved    the day we pulled the bytes
#   sha256       SHA-256 of the PDF bytes (enforced by the guard test)
#   fill         acroform | overlay | none
#   object_path  path in the assets bucket; repo path is `notation_templates/` + this
#   note         acquisition caveats, if any

[[form]]
authority = "Nevada Secretary of State"
