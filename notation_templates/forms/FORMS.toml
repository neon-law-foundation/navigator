retrieved = "2026-06-12"
sha256 = "a28a31967267d37e27e156a13070d81db201900aaae20eed47f0b239c8ca3b30"
fill = "acroform"
object_path = "forms/nv_sos/nv_sos__llc_formation-2023-08.pdf"
note = """
Downloaded in a browser from the all-business-forms listing; nvsos.gov sits \
behind Imperva Incapsula, so per-document URLs are session-gated and \
non-browser clients get a 403."""

