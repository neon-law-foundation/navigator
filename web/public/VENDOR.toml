# Noto Serif — the firm typeface (The Noto Project, OFL-1.1). Self-hosted from
# the Fontsource @fontsource/noto-serif package; the bytes are the upstream
# woff2 verbatim, one file per subset x style. The browser fetches only the
# subsets a page needs (via the unicode-range in web/public/css/noto-serif.css).
# The matching variable TTF masters (from google/fonts) are embedded in the
# `pdf` crate for Typst rendering. No CDN on either surface.

