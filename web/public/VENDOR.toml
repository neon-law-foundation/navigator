# Vendored front-end assets — single source of truth.
#
# Every third-party CSS/JS/font we serve from `web/public/` is pinned here by
# version + SHA-256. The bytes on disk are the artifact; this file records what
# they are and where they came from. `web/tests/vendor_assets.rs` recomputes
# each `sha256` from `served_path` and fails on drift, so this file cannot lie.
#
# To refresh an asset, use the `update-web-assets` skill — never hand-edit a
# minified blob. Minor/patch bumps are routine; a MAJOR bump (e.g. Bootstrap
# 5 -> 6) restyles every page and must go through `/council` first.
#
# Fields:
#   name         human label
#   version      pinned upstream version
#   upstream_url the exact URL the bytes were fetched from
#   served_path  path under web/public/ (also the URL after the `/public` nest)
#   sha256       SHA-256 of the on-disk bytes (enforced by the test)
#   modified     true if we edited the file post-download (its sha will NOT
#                match upstream; see `note`)

