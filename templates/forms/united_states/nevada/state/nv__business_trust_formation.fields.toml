# Field map for the NV SoS Business Trust Formation Packet
# (NRS 88A, rev 2023-08). Field names are the exact AcroForm /T from a
# dump of the vendored bytes — no guessing (vendor-gov-forms skill);
# note `Name of Registered Agenl`, a typo OmniForm baked into the
# official form. Payment-card fields and the Registered Agent
# Acceptance page are deliberately unmapped.

form_code = "nv__business_trust_formation"

# ---- Certificate of Business Trust (packet page 2) ----

[[field]] # Filing under NRS 88A: domestic business trust.
name = "formation2"
literal = "NRS 88A"

[[field]]
name = "1 Name of Entity If foreign name in home jurisdiction"
question = "entity__company.name"

[[field]] # The official form misspells "Agent" in this field's /T.
name = "Name of Registered Agenl"
question = "person__registered_agent.name"

# 4. Name and Address of Trustees — two slots on the certificate.

[[field]]
name = "Nameb"
question = "trustees"
row = 0
part = "name"

[[field]] # OmniForm named slot 1's street address field `undefined`.
name = "undefined"
question = "trustees"
row = 0
part = "street"

[[field]]
name = "City_3d"
question = "trustees"
row = 0
part = "city"

[[field]]
name = "Stated"
question = "trustees"
row = 0
part = "state"

[[field]]
name = "ZipPostal Coded"
question = "trustees"
row = 0
part = "zip"

[[field]]
name = "Countryb"
question = "trustees"
row = 0
part = "country"

[[field]]
name = "Name_2d"
question = "trustees"
row = 1
part = "name"

[[field]]
name = "Street Address_2d"
question = "trustees"
row = 1
part = "street"

[[field]]
name = "City_4e"
question = "trustees"
row = 1
part = "city"

[[field]]
