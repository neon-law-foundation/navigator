# 12. Name, Address and Signature of the Organizer. In this flow the
# first listed manager / managing member acts as the organizer; the
# attorney confirms at staff review before anything is signed or filed.

[[field]] # OmniForm swallowed the perjury notice into the organizer name field's /T.
name = "knowingly offer any false or forged instrument for filing in the Office of the Secretary of State"
question = "managing_members"
row = 0
part = "name"

[[field]]
name = "Address6"
