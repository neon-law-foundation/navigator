# ---- Initial List & State Business License (packet pages 4-5) ----

[[field]]
name = "NAME OF ENTITY"
question = "entity__company.name"

[[field]] # Entity type: Limited-Liability Company.
name = "entityType_2"
literal = "Limited-Liability Company"

