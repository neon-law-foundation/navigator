# Field map for the NV SoS LLC Formation Packet (NRS 86, rev 2023-08).
#
# Every `name` below is the exact AcroForm `/T` from a dump of the
# vendored bytes — see the vendor-gov-forms skill (canonical example on
# disk, no guessing). OmniForm names are hostile (`undefined`, `City_5`)
# and are reproduced byte-for-byte; the guard test fails if a re-vendor
# renames one. Customer Order / ePayment card fields are deliberately
# unmapped: payment data never flows through the questionnaire. The
# Registered Agent Acceptance page (packet p6) is a staff-side artifact
# and stays unmapped too.
#
# Known quirk: the Initial List slot-1 `City` and `State` fields share
# their widgets with the ePayment Checklist (kid pages [5, 10]), so
# filling them would also print onto the payment form. They stay
# unmapped; staff completes slot 1's city/state during review.

form_code = "nv__llc_formation"

# ---- Articles of Organization (packet pages 2-3) ----

[[field]] # Filing under NRS 86: domestic Limited-Liability Company.
name = "formation_1"
literal = "NRS 86"

[[field]]
name = "1 Name of Entity If foreign name in home jurisdiction"
question = "entity__company.name"

[[field]]
name = "Name of Registered Agent"
question = "person__registered_agent.name"

[[field]] # 5. Management — checked when manager-managed.
name = "managers_a"
question = "management_structure"
checked_when = "managers"
on_state = "managers"

[[field]] # 5. Management — checked when member-managed.
name = "managers_b"
question = "management_structure"
checked_when = "members"
on_state = "members"

# 6. Name and Address of each Manager / Managing Member — three slots.

[[field]]
name = "Name3"
question = "managing_members"
row = 0
part = "name"

[[field]] # OmniForm named slot 1's street address field `undefined`.
name = "undefined"
question = "managing_members"
row = 0
part = "street"

[[field]]
name = "City_33"
question = "managing_members"
row = 0
part = "city"

[[field]]
name = "State3"
question = "managing_members"
row = 0
part = "state"

[[field]]
name = "ZipPostal Code3"
question = "managing_members"
row = 0
part = "zip"

[[field]]
name = "Country3"
question = "managing_members"
row = 0
part = "country"

[[field]]
