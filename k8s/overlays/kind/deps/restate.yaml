# Restate broker — managed by the Restate Operator
# (`helm install restate-operator …` in `navigator kind-up`).
#
# The operator reconciles this `RestateCluster` CR into a
# StatefulSet, PVC, ConfigMap, ClusterIP Service, and a deny-all
# NetworkPolicy — all placed in a namespace named after the cluster
# (`restate`), *not* in the CR's own namespace. Cross-namespace
# consumers reach the broker at `restate.restate.svc.cluster.local`
# (ingress :8080, admin :9070).
#
# RestateDeployment CRs (see `k8s/workflows-service/`) reference
# this cluster by name via `spec.restate.register.cluster: restate`.
#
# `security.networkPeers.ingress` whitelists who may call the
# ingress port. The default is empty (deny all); without this
# block, `navigator-web` cannot reach the broker.
#
# Pin `compute.image` to an explicit tag — never `latest`. This
# overlay is applied by BOTH local `deploy` and CI's `deploy.yml`,
# and the server tag must stay aligned with the operator chart and
# restate CLI pinned in `cli/src/devx/mod.rs`
# (`RESTATE_OPERATOR_VERSION` / `RESTATE_CLI_VERSION`). Keep all
# three on the same release: server 1.7.0 ⇄ operator 2.6.1 ⇄ CLI
# 1.7.0. The 2.6.x operator is the generation built for the 1.7
# server line; the older 2.5.1 operator could not provision a 1.7.0
# node (its gRPC `ProvisionCluster` call to `restate-0…:5122` failed
# with a `transport error`, leaving the node stuck `0/1` "awaiting
# provisioning"). `:latest` last drifted onto 1.7.0 on 2026-06-18.
apiVersion: restate.dev/v1
kind: RestateCluster
metadata:
  name: restate
  namespace: navigator
spec:
  cluster:
    autoProvision: true
  compute:
    image: docker.restate.dev/restatedev/restate:1.7.0
  security:
    networkPeers:
      ingress:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: navigator
  storage:
    # 1 GiB — matches the previous hand-rolled PVC. Resize via
    # `storage.storageRequestBytes` and re-apply; the operator
    # supports online volume expansion.
    storageRequestBytes: 1073741824
  config: |
    auto-provision = false
